<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRONOSTIC VITAL</title>
<style>
  :root {
    --bg-dark: #0f172a;
    --bg-card: rgba(30, 41, 59, 0.7);
    --primary: #ef4444; /* Red */
    --secondary: #22c55e; /* Green */
    --text-main: #f8fafc; /* White */
    --text-muted: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
  body {
    background: var(--bg-dark);
    color: var(--text-main);
    overflow-x: hidden;
    min-height: 100vh;
    position: relative;
  }
  /* Animated Background */
  .bg-lines {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
    background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 80px);
    animation: moveLines 20s linear infinite;
  }
  @keyframes moveLines { 0% { background-position: 0 0; } 100% { background-position: 113px 113px; } }
  
  .container { max-width: 800px; margin: 0 auto; padding: 20px; }
  
  /* Glassmorphism */
  .card {
    background: var(--bg-card);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    animation: slideUp 0.5s ease forwards;
    opacity: 0;
    transform: translateY(20px);
  }
  @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

  h1, h2, h3 { text-align: center; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 2px; }
  h1 { font-size: 2rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; }
  
  button {
    background: linear-gradient(45deg, var(--primary), #b91c1c);
    color: white; border: none; padding: 12px 24px; border-radius: 8px;
    font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%;
    transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
    box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
    margin-top: 10px;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(239, 68, 68, 0.6); }
  button.green { background: linear-gradient(45deg, var(--secondary), #15803d); box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
  button.green:hover { box-shadow: 0 0 25px rgba(34, 197, 94, 0.6); }

  textarea, input {
    width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2);
    color: white; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-family: monospace;
  }
  textarea { height: 150px; resize: vertical; }
  textarea:focus, input:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }

  /* Screens */
  .screen { display: none; min-height: 100vh; flex-direction: column; justify-content: center; align-items: center; }
  .screen.active { display: flex; }

  /* Intro Animation */
  .circles { position: relative; width: 100px; height: 100px; margin-bottom: 30px; }
  .circle { position: absolute; width: 40px; height: 40px; border-radius: 50%; mix-blend-mode: screen; animation: float 3s ease-in-out infinite alternate; }
  .c-red { background: var(--primary); left: 0; top: 0; animation-delay: 0s; }
  .c-green { background: var(--secondary); right: 0; top: 0; animation-delay: -1s; }
  .c-white { background: white; left: 30px; bottom: 0; animation-delay: -2s; }
  @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(20px, 20px); } }
  
  .radar {
    width: 150px; height: 150px; border-radius: 50%; border: 2px solid var(--secondary);
    position: relative; overflow: hidden; margin: 0 auto 20px; box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
  }
  .radar::before {
    content: ''; position: absolute; top: 50%; left: 50%; width: 50%; height: 50%;
    background: linear-gradient(45deg, rgba(34, 197, 94, 0.5) 0%, transparent 50%);
    transform-origin: 0 0; animation: scan 2s linear infinite;
  }
  @keyframes scan { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  .match-card { border-left: 4px solid var(--secondary); }
  .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; font-size: 1.2rem; }
  .prediction-badge { background: var(--secondary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; }
  .confidence { color: var(--secondary); font-weight: bold; }
  .odds-row { display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; margin: 10px 0; }
  
  .details-panel { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .detail-item { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; text-align: center; }
  .detail-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }
  .detail-value { font-weight: bold; color: white; }

  .risk-green { color: var(--secondary); }
  .risk-orange { color: #f59e0b; }
  .risk-red { color: var(--primary); }
</style>
</head>
<body>
  <div class="bg-lines"></div>

  <!-- INTRO SCREEN -->
  <div id="screen-intro" class="screen active">
    <div class="circles" id="intro-circles">
      <div class="circle c-red"></div>
      <div class="circle c-green"></div>
      <div class="circle c-white"></div>
    </div>
    <h1 id="intro-logo" style="display:none; font-size: 3rem;">PRONOSTIC VITAL</h1>
    <p id="intro-text" style="margin-top: 20px; letter-spacing: 2px;">INITIALIZING VIRTUAL ENGINE...</p>
    <button id="btn-activate" style="display:none; width: auto; margin-top: 30px;">ACTIVATE SIGNAL</button>
  </div>

  <!-- ACTIVATION SCREEN -->
  <div id="activationScreen" class="screen">
    <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
      <h2>SECRET CODE</h2>
      <input type="password" id="secretCode" placeholder="Enter code..." style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;">
      <button id="btn-verify">VERIFY</button>
      <p id="accessMessage" style="margin-top: 15px; font-weight: bold;"></p>
    </div>
  </div>

  <!-- LOADING SCREEN -->
  <div id="screen-loading" class="screen">
    <div class="radar"></div>
    <h2 id="loadingText">LOADING VIRTUAL ANALYSIS ENGINE...</h2>
  </div>

  <!-- MAIN APP -->
  <div id="historiqueScreen" class="screen" style="display: none; padding: 40px 0; justify-content: flex-start;">
    <div class="container" style="width: 100%;">
      <h1>⚽ PRONOSTIC VITAL ⚽</h1>
      
      <!-- STEP 1 -->
      <div class="card" id="step1-card">
        <h2>HISTORIQUE DES MATCHS</h2>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;">Format: TeamA 2-1 TeamB</p>
        <textarea id="history-input" placeholder="TeamA 2-1 TeamB&#10;TeamC 1-1 TeamD"></textarea>
        <button id="btn-save-history">SAUVEGARDER HISTORIQUE</button>
        <button id="btn-ready-analysis" class="green" style="display:none;">PRÊT ANALYSE</button>
      </div>

      <!-- STEP 2 -->
      <div class="card" id="step2-card" style="display:none;">
        <h2>MATCHS À ANALYSER</h2>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;">Format: TeamA vs TeamB \n 1: 2.90 | X: 3.40 | 2: 2.40</p>
        <textarea id="matches-input" placeholder="TeamA vs TeamB&#10;1: 2.90 | X: 3.40 | 2: 2.40"></textarea>
        <button id="btn-run-analysis" class="green">LANCER ANALYSE</button>
      </div>

      <!-- RESULTS -->
      <div id="results-container" style="display:none;">
        <h2>⚽ MATCH CIBLE</h2>
        <div id="matches-cible"></div>
        
        <h2 style="margin-top: 40px;">CHOIX 10 MULTIPLE</h2>
        <div id="multiple-10"></div>

        <h2 style="margin-top: 40px;">COTE PLUS DE 10 CIBLÉ</h2>
        <div id="high-odds"></div>
      </div>
    </div>
  </div>

<script>
  // State
  let historyData = {};
  let analysisResults = [];

  // Audio Context for scanning sound
  const playScanSound = () => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.5);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.5);
    } catch(e) {}
  };

  // Navigation
  const showScreen = (id) => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById(id).style.display = 'flex';
  };

  // Intro Sequence
  setTimeout(() => {
    document.getElementById('intro-circles').style.display = 'none';
    document.getElementById('intro-logo').style.display = 'block';
    document.getElementById('intro-text').innerText = 'WAITING...';
    setTimeout(() => {
      document.getElementById('btn-activate').style.display = 'block';
    }, 2000);
  }, 3000);

  document.getElementById('btn-activate').addEventListener('click', () => {
    showScreen('activationScreen');
  });

  // Activation
  function showHistoriqueScreen() {
    document.getElementById("activationScreen").style.display = "none";
    document.getElementById("screen-loading").style.display = "none";
    document.getElementById("historiqueScreen").style.display = "block";
  }

  const codeInput = document.getElementById("secretCode");

  function verifyCode() {
    const code = codeInput.value.trim();
    const msg = document.getElementById("accessMessage");

    if(code === "V800") {
      msg.style.color = 'var(--secondary)';
      msg.innerText = "ACCESS GRANTED";
      document.getElementById("loadingText").innerText = "LOADING VIRTUAL ANALYSIS ENGINE...";

      setTimeout(() => {
        document.getElementById("activationScreen").style.display = "none";
        document.getElementById("screen-loading").style.display = "flex";
        
        setTimeout(function() {
          showHistoriqueScreen();
        }, 5000);
      }, 1000);
    } else {
      msg.style.color = 'var(--primary)';
      msg.innerText = "INVALID CODE";
    }
  }

  document.getElementById('btn-verify').addEventListener('click', verifyCode);

  const normalizeText = (text) => {
    return text
      .replace(/–|—/g, "-")
      .replace(/[“”]/g, '"')
      .replace(/[‘’]/g, "'")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  };

  // Step 1: Parse History
  document.getElementById('btn-save-history').addEventListener('click', () => {
    let text = document.getElementById('history-input').value;
    text = normalizeText(text);
    const lines = text.split('\n').filter(l => l.trim() !== '');
    historyData = {};
    
    lines.forEach(line => {
      // Regex to match: TeamA 2-1 TeamB or TeamA 2 - 1 TeamB
      const match = line.match(/(.+?)\s+(\d+)\s*[:-]\s*(\d+)\s+(.+)/);
      if(match) {
        const t1 = match[1].trim().toLowerCase();
        const g1 = parseInt(match[2]);
        const g2 = parseInt(match[3]);
        const t2 = match[4].trim().toLowerCase();

        if(!historyData[t1]) historyData[t1] = { gf:0, ga:0, matches:0, w:0, d:0, l:0 };
        if(!historyData[t2]) historyData[t2] = { gf:0, ga:0, matches:0, w:0, d:0, l:0 };

        historyData[t1].gf += g1; historyData[t1].ga += g2; historyData[t1].matches++;
        historyData[t2].gf += g2; historyData[t2].ga += g1; historyData[t2].matches++;

        if(g1 > g2) { historyData[t1].w++; historyData[t2].l++; }
        else if(g1 < g2) { historyData[t1].l++; historyData[t2].w++; }
        else { historyData[t1].d++; historyData[t2].d++; }
      }
    });

    const btn = document.getElementById('btn-save-history');
    btn.innerText = 'SAUVEGARDÉ ✓';
    btn.style.background = 'var(--secondary)';
    document.getElementById('btn-ready-analysis').style.display = 'block';
  });

  document.getElementById('btn-ready-analysis').addEventListener('click', () => {
    document.getElementById('step1-card').style.display = 'none';
    document.getElementById('step2-card').style.display = 'block';
  });

  // Step 2: Run Analysis
  const launchAnalyse = () => {
    const btn = document.getElementById('btn-run-analysis');
    const oldText = btn.innerText;
    btn.disabled = true;
    btn.style.opacity = '0.5';

    let text = document.getElementById('matches-input').value;
    text = normalizeText(text);
    const lines = text.split('\n').filter(l => l.trim() !== '');
    
    let currentMatch = null;
    const matchesToAnalyze = [];

    try {
      // 2 Parse the match input
      // 3 Parse the odds
      for(let i=0; i<lines.length; i++) {
        let line = lines[i];
        
        // Check if it's an odds line
        const oddsMatch = line.match(/1\s*[:\-]?\s*([\d.]+).*?X\s*[:\-]?\s*([\d.]+).*?2\s*[:\-]?\s*([\d.]+)/i);
        if(oddsMatch && currentMatch) {
          currentMatch.odds = { 1: parseFloat(oddsMatch[1]), x: parseFloat(oddsMatch[2]), 2: parseFloat(oddsMatch[3]) };
        } else {
          // It might be a match line
          let parts = line.split(/vs| - | – | — /i);
          if (parts.length >= 2) {
            currentMatch = { t1: parts[0].trim(), t2: parts[1].trim(), odds: {1:0, x:0, 2:0} };
            matchesToAnalyze.push(currentMatch);
          }
        }
      }

      if(matchesToAnalyze.length === 0) {
        btn.innerText = "FORMAT INVALIDE";
        btn.style.backgroundColor = "var(--primary)";
        setTimeout(() => {
          btn.innerText = oldText;
          btn.style.backgroundColor = "var(--secondary)";
          btn.disabled = false;
          btn.style.opacity = '1';
        }, 3000);
        return;
      }
    } catch (e) {
      btn.innerText = "ERREUR PARSING";
      btn.style.backgroundColor = "var(--primary)";
      setTimeout(() => {
        btn.innerText = oldText;
        btn.style.backgroundColor = "var(--secondary)";
        btn.disabled = false;
        btn.style.opacity = '1';
      }, 3000);
      return;
    }

    // 1 Start scanning animation
    document.getElementById('historiqueScreen').style.display = 'none';
    document.getElementById('loadingText').innerText = 'ANALYZING DATA...';
    showScreen('screen-loading');
    
    let scanInterval = setInterval(playScanSound, 500);

    // Add a safety timeout so the animation always stops after 3 seconds even if an error occurs.
    setTimeout(() => {
      // 6 Stop animation
      clearInterval(scanInterval);
      
      try {
        // 4 Run probability calculations
        performAnalysis(matchesToAnalyze);
        
        // 7 Display results
        showScreen('historiqueScreen');
        document.getElementById('historiqueScreen').style.display = 'block';
        document.getElementById('step2-card').style.display = 'none';
        document.getElementById('results-container').style.display = 'block';
        
        // Ensure the function launchAnalyse() always ends by calling renderResults().
        renderResults();
        btn.disabled = false;
        btn.style.opacity = '1';
      } catch (e) {
        console.error(e);
        btn.innerText = "ERREUR ANALYSE";
        btn.style.backgroundColor = "var(--primary)";
        setTimeout(() => {
          btn.innerText = oldText;
          btn.style.backgroundColor = "var(--secondary)";
          btn.disabled = false;
          btn.style.opacity = '1';
        }, 3000);
        showScreen('historiqueScreen');
        document.getElementById('historiqueScreen').style.display = 'block';
      }
    }, 3000);
  };

  document.getElementById('btn-run-analysis').addEventListener('click', launchAnalyse);

  const getStats = (teamName) => {
    const t = teamName.toLowerCase();
    return historyData[t] || { gf:1, ga:1, matches:1, w:0.33, d:0.33, l:0.33 }; // fallback avg
  };

  const performAnalysis = (matches) => {
    analysisResults = matches.map(m => {
      const s1 = getStats(m.t1);
      const s2 = getStats(m.t2);

      const avgGf1 = s1.gf / (s1.matches||1);
      const avgGa1 = s1.ga / (s1.matches||1);
      const avgGf2 = s2.gf / (s2.matches||1);
      const avgGa2 = s2.ga / (s2.matches||1);

      const histExpG1 = (avgGf1 + avgGa2) / 2;
      const histExpG2 = (avgGf2 + avgGa1) / 2;

      // Adjust with odds implied probability
      const o1 = m.odds[1] ? (1/m.odds[1]) : 0.33;
      const ox = m.odds.x ? (1/m.odds.x) : 0.33;
      const o2 = m.odds[2] ? (1/m.odds[2]) : 0.33;
      const sumO = o1+ox+o2;
      
      const prob1 = o1/sumO;
      const probX = ox/sumO;
      const prob2 = o2/sumO;

      // Blend historical expG with odds-implied expG
      // Assume average match has 2.5 goals
      const oddsExpG1 = prob1 * 2.5;
      const oddsExpG2 = prob2 * 2.5;

      // Final expected goals
      const expG1 = (histExpG1 + oddsExpG1) / 2;
      const expG2 = (histExpG2 + oddsExpG2) / 2;
      const totalExpG = expG1 + expG2;

      // Poisson distribution function
      const poisson = (k, lambda) => {
        let p = Math.exp(-lambda);
        for(let i=1; i<=k; i++) p *= lambda / i;
        return p;
      };

      // Calculate probabilities for scores 0-0 to 6-6
      let bestScore = "0-0";
      let maxScoreProb = 0;
      let p1 = 0, px = 0, p2 = 0;

      for(let i=0; i<=6; i++) {
        for(let j=0; j<=6; j++) {
          const prob = poisson(i, expG1) * poisson(j, expG2);
          
          if(i > j) p1 += prob;
          else if(i === j) px += prob;
          else p2 += prob;

          if(prob > maxScoreProb) {
            maxScoreProb = prob;
            bestScore = `${i}-${j}`;
          }
        }
      }

      let pred1x2 = '1'; let maxP = p1;
      if(px > maxP) { pred1x2 = 'X'; maxP = px; }
      if(p2 > maxP) { pred1x2 = '2'; maxP = p2; }

      let dc = '';
      if(pred1x2 === '1') dc = px > p2 ? '1X' : '12';
      if(pred1x2 === 'X') dc = p1 > p2 ? '1X' : 'X2';
      if(pred1x2 === '2') dc = px > p1 ? 'X2' : '12';

      const confidence = Math.min(99, Math.round(maxP * 100 + 15)); // Boosted for UI
      
      const exactScore = bestScore;
      const [g1, g2] = bestScore.split('-').map(Number);
      const htScore = `${Math.floor(g1/2)}-${Math.floor(g2/2)}`;
      
      const [ht1, ht2] = htScore.split('-').map(Number);
      const [ft1, ft2] = exactScore.split('-').map(Number);
      let htRes = ht1 > ht2 ? '1' : (ht1 < ht2 ? '2' : 'X');
      let ftRes = ft1 > ft2 ? '1' : (ft1 < ft2 ? '2' : 'X');
      const htft = `${htRes}/${ftRes}`;
      
      let htDc = '';
      if(htRes === '1') htDc = '1X';
      if(htRes === 'X') htDc = '1X / X2';
      if(htRes === '2') htDc = 'X2';

      const totalGoals = ft1 + ft2;
      
      return {
        ...m,
        pred1x2, dc, confidence, exactScore, htScore, totalExpG, htft, htRes, htDc, totalGoals,
        oddsVal: m.odds[pred1x2.toLowerCase()] || 1.5
      };
    });
  };

  const renderResults = () => {
    const container = document.getElementById('matches-cible');
    container.innerHTML = '';

    analysisResults.sort((a,b) => b.confidence - a.confidence);

    analysisResults.forEach((res, index) => {
      const card = document.createElement('div');
      card.className = 'card match-card';
      card.style.animationDelay = `${index * 0.1}s`;
      
      card.innerHTML = `
        <div class="match-header">
          <span>${res.t1} vs ${res.t2}</span>
          <span class="prediction-badge">${res.dc}</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="confidence">Confidence: ${res.confidence}%</span>
          <span style="font-size:0.9rem; color:var(--text-muted);">Score estimé: ${res.exactScore}</span>
        </div>
        <div class="odds-row">
          <span>1: ${res.odds[1]||'-'}</span>
          <span>X: ${res.odds.x||'-'}</span>
          <span>2: ${res.odds[2]||'-'}</span>
        </div>
        <button onclick="toggleDetails(${index})" style="background:rgba(255,255,255,0.1); box-shadow:none;">VOIR DÉTAILS</button>
        
        <div class="details-panel" id="details-${index}">
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">1X2</div><div class="detail-value">${res.pred1x2}</div></div>
            <div class="detail-item"><div class="detail-label">Double Chance</div><div class="detail-value">${res.dc}</div></div>
            <div class="detail-item"><div class="detail-label">Mi-Temps 1X2</div><div class="detail-value">${res.htRes}</div></div>
            <div class="detail-item"><div class="detail-label">MT Double Chance</div><div class="detail-value">${res.htDc}</div></div>
            <div class="detail-item"><div class="detail-label">Score Exact</div><div class="detail-value">${res.exactScore}</div></div>
            <div class="detail-item"><div class="detail-label">Total Buts</div><div class="detail-value">${res.totalGoals}</div></div>
            <div class="detail-item"><div class="detail-label">Over 0.5</div><div class="detail-value">${res.totalExpG > 0.5 ? 'OUI' : 'NON'}</div></div>
            <div class="detail-item"><div class="detail-label">Over 1.5</div><div class="detail-value">${res.totalExpG > 1.5 ? 'OUI' : 'NON'}</div></div>
            <div class="detail-item"><div class="detail-label">Over 2.5</div><div class="detail-value">${res.totalExpG > 2.5 ? 'OUI' : 'NON'}</div></div>
            <div class="detail-item"><div class="detail-label">Over 3.5</div><div class="detail-value">${res.totalExpG > 3.5 ? 'OUI' : 'NON'}</div></div>
            <div class="detail-item"><div class="detail-label">GG / NG</div><div class="detail-value">${(res.totalExpG > 2 && res.exactScore !== '2-0' && res.exactScore !== '0-2') ? 'GG' : 'NG'}</div></div>
            <div class="detail-item"><div class="detail-label">HT/FT</div><div class="detail-value">${res.htft}</div></div>
          </div>
        </div>
      `;
      container.appendChild(card);
    });

    generateMultiples();
    generateHighOdds();
  };

  window.toggleDetails = (index) => {
    const panel = document.getElementById(`details-${index}`);
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
  };

  const generateMultiples = () => {
    const container = document.getElementById('multiple-10');
    container.innerHTML = '';
    
    // Generate 10 combinations
    for(let i=1; i<=10; i++) {
      // Pick 2-4 random matches from top half
      const numPicks = Math.floor(Math.random() * 3) + 2;
      const picks = [];
      let totalOdds = 1;
      let totalConf = 0;
      
      const pool = analysisResults.slice(0, Math.max(3, Math.floor(analysisResults.length/2)));
      const shuffled = [...pool].sort(() => 0.5 - Math.random());
      
      for(let j=0; j<Math.min(numPicks, shuffled.length); j++) {
        picks.push(shuffled[j]);
        totalOdds *= (shuffled[j].oddsVal || 1.3);
        totalConf += shuffled[j].confidence;
      }
      
      if(picks.length === 0) continue;

      const avgConf = Math.round(totalConf / picks.length);
      
      const card = document.createElement('div');
      card.className = 'card';
      let picksHtml = picks.map(p => `<div style="font-size:0.9rem; margin:5px 0;">• ${p.t1} vs ${p.t2} <b>(${p.dc})</b></div>`).join('');
      
      card.innerHTML = `
        <h3 style="text-align:left; color:var(--secondary);">MULTIPLE #${i}</h3>
        ${picksHtml}
        <div style="margin-top:15px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between;">
          <span>Cote Totale: <b>${totalOdds.toFixed(2)}</b></span>
          <span style="color:var(--secondary);">Stabilité: ${avgConf}%</span>
        </div>
      `;
      container.appendChild(card);
    }
  };

  const generateHighOdds = () => {
    const container = document.getElementById('high-odds');
    container.innerHTML = '';
    
    let highOddsMatches = [];
    
    for(let m of analysisResults) {
      if(m.odds[1] > 10 && m.odds[1] < 100) highOddsMatches.push({match: m, team: m.t1, odd: m.odds[1], type: '1'});
      if(m.odds.x > 10 && m.odds.x < 100) highOddsMatches.push({match: m, team: 'Nul', odd: m.odds.x, type: 'X'});
      if(m.odds[2] > 10 && m.odds[2] < 100) highOddsMatches.push({match: m, team: m.t2, odd: m.odds[2], type: '2'});
    }

    if(highOddsMatches.length > 0) {
      highOddsMatches.forEach(item => {
        let riskClass = 'risk-red';
        let riskText = 'RISQUÉ';
        if(item.odd < 20) { riskClass = 'risk-orange'; riskText = 'MODÉRÉ'; }
        
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div style="font-size:1rem; margin-bottom:10px;">• ${item.match.t1} vs ${item.match.t2}</div>
          <div style="font-size:0.9rem; color:var(--text-muted); margin-bottom:10px;">Sélection: <b>${item.team} (${item.type})</b></div>
          <div style="padding-top:10px; border-top:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:1.2rem;">Cote: <b>${item.odd.toFixed(2)}</b></span>
            <span class="${riskClass}" style="font-weight:bold; border:1px solid currentColor; padding:4px 10px; border-radius:4px;">${riskText}</span>
          </div>
        `;
        container.appendChild(card);
      });
    } else {
      container.innerHTML = '<p style="color:var(--text-muted);">Aucune cote > 10 détectée dans les matchs.</p>';
    }
  };
</script>
</body>
</html>
